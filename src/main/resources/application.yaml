spring:
  application:
    name: PRM
  datasource:
    url: jdbc:postgresql://localhost:5432/prm
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

app:
  jwt:
    secret: super-secret-key-must-be-at-least-256-bits-long-here
    expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs


cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dktu0nbjx}
  api-key: ${CLOUDINARY_API_KEY:655488269595982}
  api-secret: ${CLOUDINARY_API_SECRET:G1c_p5xy2VaZcCzd9nLofBYjHUc}
  folder: prm/products